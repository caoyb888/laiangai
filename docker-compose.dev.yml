# 开发环境覆盖，见 CLAUDE.md §10.1
# 使用方式：docker compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.9"

services:

  lgdoc-backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend/app:/app/app          # 热重载：挂载源码
      - ./backend/app/services/prompts:/app/app/services/prompts
      - /home/laigang/models/bge-m3:/models/bge-m3  # 本地 BGE-M3 模型，避免从网络下载
      - /usr/share/fonts/truetype/wqy:/host-fonts:ro  # 宿主机 WQY TrueType 中文字体（PDF 生成用）
    environment:
      APP_ENV: dev
      LLM_API_MOCK: "true"              # 开发环境默认 Mock LLM，见 CLAUDE.md §10.1
      LOG_LEVEL: DEBUG
      VECTOR_ENABLED: "true"            # 启用向量化
      HF_HUB_OFFLINE: "1"              # 离线模式，禁止访问 huggingface.co
      BGE_M3_MODEL_PATH: "/models/bge-m3"  # 本地模型路径
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

  lgdoc-frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"                     # Vite dev server 直连
    volumes:
      - ./frontend/src:/app/src         # 热重载：挂载源码
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      VITE_API_TARGET: "http://lgdoc-backend:8000"  # 容器内用 Docker 内网主机名
    command: pnpm dev --host 0.0.0.0

  lgdoc-nginx:
    # 开发环境不需要 nginx，frontend/backend 各自暴露端口
    profiles: [prod-only]

  lgdoc-mysql:
    ports:
      - "127.0.0.1:3306:3306"          # 开发时允许本地直连数据库

  lgdoc-redis:
    ports:
      - "127.0.0.1:6380:6379"          # 开发时允许本地直连 Redis（6379 被宿主机占用，映射到 6380）

  lgdoc-minio:
    ports:
      - "127.0.0.1:9000:9000"          # MinIO API 端口，开发时本地可访问
      - "127.0.0.1:9001:9001"
