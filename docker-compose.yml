services:

  lgdoc-backend:
    build: ./backend
    container_name: lgdoc-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"   # 仅监听本地，通过 nginx 对外
    depends_on:
      lgdoc-mysql:
        condition: service_healthy
      lgdoc-redis:
        condition: service_healthy
      lgdoc-minio:
        condition: service_started
      lgdoc-milvus:
        condition: service_started
    volumes:
      - ./backend/app/services/prompts:/app/app/services/prompts:ro
    networks: [lgdoc-net]

  lgdoc-frontend:
    build:
      context: ./frontend
      target: production
    container_name: lgdoc-frontend
    restart: unless-stopped
    networks: [lgdoc-net]

  lgdoc-nginx:
    image: nginx:1.25-alpine
    container_name: lgdoc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on: [lgdoc-backend, lgdoc-frontend]
    networks: [lgdoc-net]

  lgdoc-mysql:
    image: mysql:8.0.28
    container_name: lgdoc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: lgdoc
      MYSQL_USER: lgdoc
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - lgdoc-mysql-data:/var/lib/mysql     # 持久化，见 CLAUDE.md §10.3
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: []                                # 不暴露端口到宿主机外网
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [lgdoc-net]

  lgdoc-redis:
    image: redis:7.2-alpine
    container_name: lgdoc-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - lgdoc-redis-data:/data
    ports: []
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [lgdoc-net]

  lgdoc-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: lgdoc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - lgdoc-minio-data:/data
    ports:
      - "127.0.0.1:9001:9001"   # MinIO 控制台仅本地访问
    networks: [lgdoc-net]

  lgdoc-milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: lgdoc-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: lgdoc-milvus-etcd:2379
      MINIO_ADDRESS: lgdoc-minio:9000
    volumes:
      - lgdoc-milvus-data:/var/lib/milvus
    ports: []
    depends_on: [lgdoc-minio, lgdoc-milvus-etcd]
    networks: [lgdoc-net]

  lgdoc-milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: lgdoc-milvus-etcd
    restart: unless-stopped
    command: >
      etcd
      -advertise-client-urls=http://lgdoc-milvus-etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - lgdoc-etcd-data:/etcd
    networks: [lgdoc-net]

volumes:
  lgdoc-mysql-data:
  lgdoc-redis-data:
  lgdoc-minio-data:
  lgdoc-milvus-data:
  lgdoc-etcd-data:

networks:
  lgdoc-net:
    driver: bridge
